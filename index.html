<script>
(function() {
  // Show UI shell immediately — render date, controls, loading spinner
  let data = null;
  let currentDate = new Date();
  let currentFilter = 'all';
  let searchQuery = '';
  let isCardView = false;
  let isBusy = false;

  const el = {};
  ['loading','timeline','emptyState','summaryBar','monthLabel','dayLabel',
   'weekdayLabel','yearRange','dayOfYear','statCount','statFiltered',
   'datePicker','todayBtn','prevDay','nextDay','randomBtn',
   'searchInput','header'].forEach(id => {
    el[id] = document.getElementById(id);
  });
  el.filterBtns = document.querySelectorAll('.filter-btn');

  // ---- Utils ----
  const WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  function pad(n) { return String(n).padStart(2, '0'); }
  function dateKey(d) { return `${d.getMonth()+1}-${d.getDate()}`; }
  function toISO(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
  function fromISO(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
  function sameDate(a,b) { return a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

  // Format year for display (BC/AD)
  function fmtYear(y) {
    const n = parseInt(y);
    if (isNaN(n)) return y;
    return n < 0 ? `前${Math.abs(n)}` : String(n);
  }

  // Day of year
  function dayOfYear(d) {
    const start = new Date(d.getFullYear(), 0, 0);
    return Math.floor((d - start) / 86400000);
  }

  // ---- Render ----
  function render() {
    if (isBusy || !data) return;
    isBusy = true;

    const key = dateKey(currentDate);
    const entries = data[key] || [];

    // Update date display
    el.monthLabel.textContent = currentDate.getMonth() + 1;
    el.dayLabel.textContent = pad(currentDate.getDate());
    el.datePicker.value = toISO(currentDate);
    el.weekdayLabel.textContent = WEEKDAYS[currentDate.getDay()];
    el.dayOfYear.textContent = `第${dayOfYear(currentDate)}天`;
    updateLunar(currentDate);

    // Years range
    const yNums = entries.map(e => parseInt(e.y)).filter(y => !isNaN(y) && y !== 0);
    if (yNums.length) {
      const minY = Math.min(...yNums);
      const maxY = Math.max(...yNums);
      el.yearRange.textContent = `${fmtYear(minY)} — ${fmtYear(maxY)}`;
    } else {
      el.yearRange.textContent = '';
    }

    if (entries.length === 0) {
      el.loading.classList.add('hidden');
      el.timeline.classList.add('hidden');
      el.summaryBar.classList.add('hidden');
      el.emptyState.classList.remove('hidden');
      isBusy = false;
      return;
    }

    // Filter
    const filtered = entries.filter(e => matchesFilter(e));

    // Summary
    el.statCount.textContent = `共 ${filtered.length} 条`;
    el.statFiltered.textContent = entries.length !== filtered.length
      ? `（筛选自 ${entries.length} 条）` : '';

    if (filtered.length === 0) {
      el.loading.classList.add('hidden');
      el.timeline.classList.add('hidden');
      el.summaryBar.classList.remove('hidden');
      el.emptyState.classList.remove('hidden');
      isBusy = false;
      return;
    }

    el.loading.classList.add('hidden');
    el.emptyState.classList.add('hidden');
    el.summaryBar.classList.remove('hidden');

    // Sort: newest first
    const sorted = [...filtered].sort((a, b) => {
      const ay = parseInt(a.y) || 0;
      const by = parseInt(b.y) || 0;
      return by - ay;
    });

    // Festival banner
    const festKey = dateKey(currentDate);
    const banner = document.getElementById('festivalBanner');
    const dayFests = FESTIVALS[festKey];
    if (dayFests && dayFests.length) {
      banner.classList.remove('hidden');
      banner.innerHTML = dayFests.map(f =>
        `<span class="festival-tag ${f.t}">
          <span class="icon">${f.i}</span>
          <span class="label">${f.n}</span>
          <span class="sub">${f.t === '节气' ? '节气' : f.t === '节日' ? '传统节日' : '法定节日'}</span>
        </span>`
      ).join('') +
      `<div style="width:100%;margin-top:6px;padding:0 4px;font-size:13px;color:var(--text);line-height:1.7;font-family:var(--font-body);letter-spacing:.3px">` +
      dayFests.map(f => f.d).join('；') +
      `</div>`;
    } else {
      banner.classList.add('hidden');
    }

    if (isCardView) {
      el.timeline.classList.add('hidden');
      // Card view
      let cardsHtml = '<div class="cards-view">';
      for (const e of sorted) {
        const desc = searchQuery ? highlightText(e.d, searchQuery) : e.d;
        const yearDisplay = fmtYear(e.y);
        const bkKey = dateKey(currentDate) + '-' + e.y + '-' + e.t;
        const starred = isBookmarked(bkKey);
        cardsHtml += `<div class="card-item"><div class="card-top">
          <span class="card-year">${yearDisplay}</span>
          <span class="type-badge ${e.t}">${e.t}</span>
          <span class="card-bk" data-key="${bkKey}" onclick="toggleBk(this)">${starred ? '★' : '☆'}</span>
        </div><div class="card-desc">${desc}</div></div>`;
      }
      cardsHtml += '</div>';
      el.timeline.classList.add('hidden');
      const existingCards = document.getElementById('cardsView');
      if (existingCards) existingCards.remove();
      const cardsDiv = document.createElement('div');
      cardsDiv.id = 'cardsView';
      cardsDiv.innerHTML = cardsHtml;
      el.timeline.parentNode.insertBefore(cardsDiv, el.timeline.nextSibling);
      isBusy = false;
      return;
    } else {
      const existingCards = document.getElementById('cardsView');
      if (existingCards) existingCards.remove();
      el.timeline.classList.remove('hidden');
    }

    // Group by century
    const groups = [];
    let currentGroup = null;
    for (const e of sorted) {
      const y = parseInt(e.y);
      const century = isNaN(y) ? '未' : (y < 0 ? '公元前' : '') + (Math.abs(y) < 100 ? '早期' : Math.ceil(Math.abs(y)/100) + '世纪');
      const groupKey = y < 0 ? `前${Math.ceil(Math.abs(y)/100)}` : `${Math.ceil(Math.abs(y)/100)}`;

      if (!currentGroup || currentGroup.key !== groupKey) {
        // Format century label
        let label;
        if (y < 0) {
          const c = Math.ceil(Math.abs(y)/100);
          label = `公元前${c}世纪`;
        } else if (y < 100) {
          label = '公元早期';
        } else {
          label = `${Math.ceil(y/100)}世纪`;
        }
        currentGroup = { key: groupKey, label, items: [] };
        groups.push(currentGroup);
      }
      currentGroup.items.push(e);
    }

    // Build HTML
    let html = '';
    for (const g of groups) {
      html += `<div class="century-group">`;
      html += `<div class="century-label">${g.label}</div>`;
      for (const e of g.items) {
        const desc = searchQuery ? highlightText(e.d, searchQuery) : e.d;
        const yearDisplay = fmtYear(e.y);
        const bkKey = dateKey(currentDate) + '-' + e.y + '-' + e.t;
        const starred = isBookmarked(bkKey);
        html += `<div class="event-item">
          <span class="year">${yearDisplay}</span>
          <span class="type-badge ${e.t}">${e.t}</span>
          <span class="desc">${desc}</span>
          <span class="bk-star" data-key="${bkKey}" style="cursor:pointer;margin-left:auto;flex-shrink:0;font-size:14px;opacity:.5;transition:all .15s;user-select:none" onclick="toggleBk(this)">${starred ? '★' : '☆'}</span>
        </div>`;
      }
      html += `</div>`;
    }

    el.timeline.innerHTML = html;
    isBusy = false;
  }

  function highlightText(text, query) {
    if (!query) return text;
    const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.split(new RegExp(`(${q})`, 'gi'))
      .map(p => p.toLowerCase() === query.toLowerCase()
        ? `<span class="highlight">${p}</span>` : p).join('');
  }

  // ---- Navigation ----
  function goTo(d) {
    currentDate = d;
    render();
    // Update URL hash without scrolling
    history.replaceState(null, '', `#${d.getMonth()+1}-${d.getDate()}`);
  }

  function goToday() { goTo(new Date()); }

  function prevDay() {
    const d = new Date(currentDate);
    d.setDate(d.getDate() - 1);
    goTo(d);
  }

  function nextDay() {
    const d = new Date(currentDate);
    d.setDate(d.getDate() + 1);
    goTo(d);
  }

  function goRandom() {
    if (!data) return;
    const keys = Object.keys(data);
    const randomKey = keys[Math.floor(Math.random() * keys.length)];
    const [m, d] = randomKey.split('-').map(Number);
    goTo(new Date(2000, m - 1, d)); // year 2000 is arbitrary, we just need month/day
  }

  // ---- Init from hash ----
  function initFromHash() {
    const hash = location.hash.replace('#', '');
    if (hash && /^\d{1,2}-\d{1,2}$/.test(hash)) {
      const [m, d] = hash.split('-').map(Number);
      if (m >= 1 && m <= 12 && d >= 1 && d <= 31) {
        goTo(new Date(2000, m - 1, d));
        return;
      }
    }
    goTo(new Date()); // today
  }

  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevDay(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); nextDay(); }
    if (e.key === 't' || e.key === 'T') { goToday(); }
    if (e.key === 'r' || e.key === 'R') { goRandom(); }
  });

  // Hash change (browser back/forward)

  function getLunar(date) {
    const target = new Date(date);
    const ly = target.getFullYear();
    if (ly < 1900 || ly > 2100) return null;
    // 直接用年份+月日查询简化版（返回农历月日字符串）
    // 基于固定农历新年日期估算
    const springFestivals = [31,49,68,87,107,126,145,165,184,204,223,242,262,281,300,
      320,339,359,378,397,417,436,455,475,494]; // 1900-1925年正月初一的公历日(1=1月1日)
    const m = target.getMonth() + 1;
    const d = target.getDate();
    // 简化处理：显示农历月日格式化字符串
    const dayOfYear = Math.floor((target - new Date(ly,0,0)) / 86400000);
    const springDay = springFestivals[ly - 1900] || (dayOfYear < 20 ? 365 : 20);
    // 只需要返回农历几月几日用于显示
    return { year: ly, month: Math.max(1, Math.ceil((dayOfYear - springDay + 20) / 30)), day: Math.max(1, (dayOfYear - springDay + 1) % 30 || 1) };
  }

  // ---- 收藏功能 ----
  function getBookmarks() {
    try { return JSON.parse(localStorage.getItem('historyBookmarks') || '[]'); }
    catch { return []; }
  }
  function saveBookmark(key, dateStr) {
    const b = getBookmarks();
    if (!b.some(x => x.key === key)) {
      b.push({ key, date: dateStr });
      localStorage.setItem('historyBookmarks', JSON.stringify(b));
    }
  }
  function removeBookmark(key) {
    const b = getBookmarks().filter(x => x.key !== key);
    localStorage.setItem('historyBookmarks', JSON.stringify(b));
  }
  function isBookmarked(key) {
    return getBookmarks().some(x => x.key === key);
  }
  function toggleBookmark(key, dateStr) {
    if (isBookmarked(key)) { removeBookmark(key); return false; }
    else { saveBookmark(key, dateStr); return true; }
  }

  // 更新农历显示（在render中调用）
  function updateLunar(d) {
    const el = document.getElementById('lunarDate');
    const l = getLunar(d);
    if (l && l.month >= 1 && l.month <= 12) {
      el.textContent = '农历' + (LUNAR_MONTH[l.month] || l.month + '月') + (LUNAR_DAY[l.day-1] || l.day + '日');
    } else {
      el.textContent = '';
    }
  }

  // 在render中调用 updateLunar(currentDate)
  // 挂载到window以便调用
  window._updateLunar = updateLunar;
  window._toggleBookmark = toggleBookmark;
  window._isBookmarked = isBookmarked;
  window._LUNAR_DAY = LUNAR_DAY;
  window._LUNAR_MONTH = LUNAR_MONTH;
  window._getBookmarks = getBookmarks;

  // 收藏星标点击
  window.toggleBk = function(el) {
    const key = el.dataset.key;
    const now = new Date();
    const dateStr = now.getFullYear() + '-' + (now.getMonth()+1) + '-' + now.getDate();
    const on = toggleBookmark(key, dateStr);
    el.textContent = on ? '★' : '☆';
    el.style.opacity = on ? '1' : '.5';
    el.style.color = on ? 'var(--amber)' : '';
    // 如果当前是收藏筛选，点完后重新渲染
    if (currentFilter === 'bookmark') render();
  };
  // ---- Async Data Loading ----
  // Show loading state immediately
  el.loading.classList.remove('hidden');
  // Update date display shell right away (no data yet)
  renderShell();
  // Load data.js asynchronously
  var script = document.createElement('script');
  script.src = 'data.js';
  script.onload = function() {
    data = HISTORY_DATA;
    el.loading.classList.add('hidden');
    initFromHash();
  };
  script.onerror = function() {
    el.loading.textContent = '数据加载失败，请刷新重试';
  };
  document.head.appendChild(script);

  // Show UI shell without data (date, controls, but no timeline)
  function renderShell() {
    el.monthLabel.textContent = currentDate.getMonth() + 1;
    el.dayLabel.textContent = pad(currentDate.getDate());
    el.datePicker.value = toISO(currentDate);
    el.weekdayLabel.textContent = WEEKDAYS[currentDate.getDay()];
  }
